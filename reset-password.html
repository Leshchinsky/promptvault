<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #cbd5e1;
      --primary: #0b1736;
      --success: #15803d;
      --error: #dc2626;
      --radius: 20px;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 380px;
      background: var(--panel);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    p.sub {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    input {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      padding: 0 14px;
      border: 1px solid var(--border);
      font: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.12);
    }

    button {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 600;
      font: inherit;
      cursor: pointer;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
      transform: none;
    }

    .message {
      margin: 2px 0 0;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }

    .message.error {
      color: var(--error);
    }

    .message.success {
      color: var(--success);
    }

    .footer-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Set new password</h1>
    <p class="sub">Enter a new password for your Prompt Vault account.</p>

    <label for="newPassword">New password</label>
    <input id="newPassword" type="password" placeholder="New password" autocomplete="new-password" />

    <label for="confirmPassword">Confirm password</label>
    <input id="confirmPassword" type="password" placeholder="Repeat new password" autocomplete="new-password" />

    <button id="savePasswordBtn" type="button">Save password</button>

    <p id="errorMsg" class="message error"></p>
    <p id="successMsg" class="message success"></p>

    <p class="footer-note">After a successful update, return to the main app and log in with the new password.</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://xhhcclmwdxkkrrbqlkze.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoaGNjbG13ZHhra3JyYnFsa3plIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzE1MjgsImV4cCI6MjA5MDA0NzUyOH0.7Eyt-poMCD40psl96EPZ6U1Vo1i_JPv7pg1L5muvWcw';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const newPassword = document.getElementById('newPassword');
    const confirmPassword = document.getElementById('confirmPassword');
    const savePasswordBtn = document.getElementById('savePasswordBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.style.display = message ? 'block' : 'none';
      successMsg.textContent = '';
      successMsg.style.display = 'none';
    }

    function showSuccess(message) {
      successMsg.textContent = message;
      successMsg.style.display = message ? 'block' : 'none';
      errorMsg.textContent = '';
      errorMsg.style.display = 'none';
    }

    async function savePassword() {
      const password = newPassword.value.trim();
      const confirm = confirmPassword.value.trim();

      showError('');
      showSuccess('');

      if (!password) {
        showError('Enter a new password.');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters long.');
        return;
      }

      if (password !== confirm) {
        showError('Passwords do not match.');
        return;
      }

      savePasswordBtn.disabled = true;
      savePasswordBtn.textContent = 'Saving...';

      const { error } = await supabaseClient.auth.updateUser({
        password
      });

      savePasswordBtn.disabled = false;
      savePasswordBtn.textContent = 'Save password';

      if (error) {
        showError(error.message || 'Failed to update password.');
        return;
      }

      showSuccess('Password updated successfully. You can now return to the app and log in.');
      newPassword.value = '';
      confirmPassword.value = '';
    }

    savePasswordBtn.addEventListener('click', savePassword);

    confirmPassword.addEventListener('keydown', event => {
      if (event.key === 'Enter') savePassword();
    });

    newPassword.addEventListener('keydown', event => {
      if (event.key === 'Enter') savePassword();
    });
  </script>
</body>
</html>
